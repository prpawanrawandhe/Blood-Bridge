<!DOCTYPE html>
<html>

<head>
    <title>All Donors</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ab1c1c, #cf8c8c);
            height: 100vh;
        }

        /* Container */
        .result-container {
            padding: 0px 40px 0px 40px;
            text-align: center;
            min-height: 100vh;
            color: white;
        }

        .cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }


        .card {
            background: white;
            color: #333;
            padding: 20px;
            margin: 15px;
            border-radius: 12px;
            width: 220px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card h3 {
            color: #c20000;
            margin-bottom: 10px;
        }

        h2 {
            color: #ffffff;
        }
    </style>
</head>

<body>

    <div class="result-container">
        <h2>All Blood Donors 🩸</h2>

        {% if donors %}
        <div class="cards">
            {% for d in donors %}
            <div class="card">
                <h3>{{ d[0] }}</h3>
                <p>Blood Group: {{ d[2] }}</p>
                <p>City: {{ d[3] }}</p>
                <p>Email: {{ d[1] }}</p>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p class="no-data">❌ No donors registered yet</p>
        {% endif %}

    </div>

</body>

</html>
