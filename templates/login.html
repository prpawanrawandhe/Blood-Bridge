<!DOCTYPE html>
<html>

<head>
    <title>Login - Blood Bridge</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ccbebe, #b32323);
            height: 100vh;
        }

        .box {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: red;
            color: white;
            border: none;
        }

        .new_user_button {
            padding: 20px;
            font-size: medium;
        }

        button:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Blood Bridge Login</h2>
        <form method="POST">
            <input type="text" name="email" placeholder="Email" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Login</button>
        </form>
        <div class="new_user_button">
            <a href="/register">New user? Register</a>
        </div>
    </div>
    {% if error %}
    <script>
        alert("{{ error }}");
    </script>
    {% endif %}
</body>

</html>
